name: Проблема качества данных
description: Ошибка в raw, dbt, dashboard или readiness-проверках.
title: "[DQ] "
labels: ["data-quality", "triage"]
body:
  - type: dropdown
    id: layer
    attributes:
      label: Слой данных
      options:
        - Raw/Bronze
        - Silver/dbt staging
        - Gold marts
        - Dashboard
        - CI/Release
    validations:
      required: true
  - type: textarea
    id: symptom
    attributes:
      label: Симптом
      description: Что упало или выглядит неверно?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Доказательства
      description: Вывод команды, имя таблицы/модели, manifest counts или заметки по скриншоту. Не вставляйте токены и приватные raw-данные.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
